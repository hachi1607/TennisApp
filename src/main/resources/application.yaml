spring:
  application:
    name: tennis-app

  datasource:
    url: jdbc:postgresql://localhost:5433/tennisapp
    username: postgres
    password: password123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration